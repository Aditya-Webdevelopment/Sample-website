<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign | Electronic Repair</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563EB; /* Trustworthy Tech Blue */
            --secondary: #0ea5e9; /* Light Tech Blue */
            --bg: #ffffff;
            --text: #111827;
            --muted: #6b7280;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden; /* ABSOLUTE RULE: No horizontal scrolling */
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 6%;
            border-bottom: 1px solid #f3f4f6;
        }

        .brand-logo {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: var(--text);
        }

        .nav-links {
            display: flex;
            gap: 2.2rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 600;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* HERO SECTION */
        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3rem; 
            padding: 4rem 6%;
            min-height: 85vh;
        }

        .hero-text {
            max-width: 520px;
        }
        
        .sample-tag {
            font-size: 0.85rem;
            color: var(--primary);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 1rem;
            display: inline-block;
            background: rgba(37, 99, 235, 0.1);
            padding: 5px 12px;
            border-radius: 4px;
        }

        .hero-text h1 {
            font-family: 'Inter', sans-serif; 
            font-size: clamp(2.5rem, 6vw, 4.2rem);
            margin-bottom: 1rem;
            line-height: 1.1;
            font-weight: 900;
            color: var(--text);
            letter-spacing: -1px;
        }

        .hero-text p {
            color: var(--muted);
            line-height: 1.7;
            font-size: 1.05rem;
        }

        /* BUTTON */
        .btn-launch {
            margin-top: 2rem;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 6px; 
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s ease;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .btn-launch:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.4);
        }

        /* HERO IMAGE */
        .hero-img {
            max-width: 420px; 
            position: relative;
        }

        .hero-img::before {
            content: '';
            position: absolute;
            inset: -20px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(14, 165, 233, 0.1));
            border-radius: 50%;
            z-index: -1;
            filter: blur(20px);
        }

        .hero-img img {
            width: 100%;
            border-radius: 12px;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15));
        }

        /* MOBILE OPTIMIZATION */
        @media(max-width: 900px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding: 2rem 5%; 
                gap: 2rem; 
                min-height: auto; 
            }

            .hero-text {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .hero-text h1 {
                font-size: 2.8rem; 
            }

            .hero-text p {
                font-size: 0.95rem; 
                padding: 0 10px;
            }

            .hero-img {
                margin-top: 1rem;
                max-width: 320px; 
            }

            .nav-links {
                display: none; 
            }
            
            nav {
                justify-content: center; 
                padding: 1.5rem 5%;
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="brand-logo">SOVEREIGN</div>
        <div class="nav-links">
            <a href="#">Services</a>
            <a href="#">Devices</a>
            <a href="#">Accessories</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <span class="sample-tag">-- Sample Website --</span>
            <h1 id="dynamic-title">Electronic Repair</h1>
            <p>
                Professional diagnostics, rapid screen replacements, and premium mobile accessories. Experience seamless tech support with our local same-day pickup and delivery network.
            </p>
            
            <button class="btn-launch" onclick="alert('This will route customers directly to your WhatsApp Catalog.')">View Services →</button>
        </div>

        <div class="hero-img">
            <img src="https://images.unsplash.com/photo-1597740985671-2a8a3b80502e?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Premium Electronic Repair">
        </div>
    </section>

    <script>
        // Reads the URL to replace the title dynamically.
        // E.g., yourwebsite.com/index.html?node=coverReady
        const params = new URLSearchParams(window.location.search);
        const node = params.get('node');
        if (node) {
            const cleanName = node.replace(/-/g, ' ');
            document.getElementById('dynamic-title').innerText = cleanName;
            document.title = cleanName + " | Tech Infrastructure";
        }
    </script>
</body>
</html>
